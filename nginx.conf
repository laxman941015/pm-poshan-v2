server {
    listen 80;
    server_name pmposhanyojnamdm.duckdns.org localhost;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pmposhanyojnamdm.duckdns.org localhost;

    ssl_certificate /etc/letsencrypt/live/pmposhanyojnamdm.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pmposhanyojnamdm.duckdns.org/privkey.pem;

    # SSL optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
