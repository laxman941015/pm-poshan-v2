version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pmposhan-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - pmposhan-network

  # 2. FastAPI Backend
  backend:
    build: ./backend
    container_name: pmposhan-api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DB_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - pmposhan-network

  # 3. React Frontend (Nginx with SSL)
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: pmposhan-ui
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - pmposhan-network

networks:
  pmposhan-network:
    driver: bridge

volumes:
  postgres_data:
